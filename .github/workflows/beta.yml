name: Beta build

# Beta tags (e.g. 1.2.0-beta.1 — deliberately NOT v-prefixed, so release.yml's
# `v*` trigger never fires for them) get a .deb built and attached to a
# GitHub Release marked as a pre-release, for a stable, no-auth-needed
# download link. Unlike release.yml, this never touches the apt repo on
# gh-pages — a beta tag is for testing, not distribution via apt.

on:
  push:
    tags:
      - '*-beta*'

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb (beta, not published)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build and test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts dpkg-dev shellcheck

      - name: Lint
        run: |
          shellcheck -x --severity=warning \
            bin/proxmox-storage-migrate \
            install.sh \
            tests/run-tests.sh \
            tests/lib/mocks.sh \
            tests/test_*.sh

      - name: Run tests
        run: bash tests/run-tests.sh

      - name: Verify tag matches debian/changelog version
        run: |
          pkg_version="$(dpkg-parsechangelog --show-field Version)"
          if [ "$pkg_version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME doesn't match debian/changelog version $pkg_version"
            exit 1
          fi

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifact
        run: |
          mkdir -p dist
          mv ../proxmox-storage-migrate_*.deb dist/

      - name: Create pre-release with the .deb attached
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.deb \
            --title "$GITHUB_REF_NAME (beta)" \
            --notes "Beta build for testing — not published to the apt repo. Built from commit $GITHUB_SHA." \
            --prerelease

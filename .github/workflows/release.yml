name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    name: Build and publish .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build and test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts dpkg-dev shellcheck

      - name: Lint
        run: |
          shellcheck -x --severity=warning \
            bin/migrate-disks.sh \
            tests/run-tests.sh \
            tests/lib/mocks.sh \
            tests/test_*.sh

      - name: Run tests
        run: bash tests/run-tests.sh

      - name: Verify tag matches debian/changelog version
        run: |
          pkg_version="$(dpkg-parsechangelog --show-field Version)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Tag v$tag_version doesn't match debian/changelog version $pkg_version"
            exit 1
          fi

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifact
        run: |
          mkdir -p dist
          mv ../proxmox-storage-migrate_*.deb dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.deb --title "$GITHUB_REF_NAME" --generate-notes
